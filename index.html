<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mana Inti Bojanam - Authentic Home-Style Telugu Meals</title>
    <meta name="description" content="Authentic home-style Telugu meals prepared with love, fresh ingredients, and zero preservatives. Serving fresh in Magarpatta, Pune." />
    
    <!-- PWA & Icons -->
    <link rel="manifest" href="/manifest.json?v=20" />
    <link rel="icon" href="/favicon.ico?v=20" />
    <link rel="stylesheet" href="/src/index.css" />
    <meta name="theme-color" content="#0C0C0C">
    
    <!-- iOS Specific Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MIB">
    
    <!-- iPhone Home Screen Icons (Using strictly text-less v14 emblem) -->
    <link rel="apple-touch-icon" href="/icon-v20-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-v20-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-v20-512.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-v20-512.png">
    
    <!-- iPhone Splash Screens -->
    <link rel="apple-touch-startup-image" href="/icon-v20-512.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
      /* Splash Screen Animations */
      @keyframes pulseEmblem {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.02); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      
      @keyframes slideUpFade {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      body {
        margin: 0;
        background-color: #0C0C0C;
        overscroll-behavior-y: none; /* iOS bounce fix */
      }
    </style>
  </head>

  <body>
    
    <!-- Premium Splash Screen with Baked-In Text Logo -->
    <div id="initial-loader" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1f1f1f 0%, #050505 80%); z-index: 9999; padding-bottom: env(safe-area-inset-bottom);">
      <img src="/logo-v20-final.png" alt="Mana Inti Bojanam Logo" style="width: 75vw; max-width: 380px; height: auto; animation: pulseEmblem 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9));" />
    </div>


    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
